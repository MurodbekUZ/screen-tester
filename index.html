<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Ekran Tester | Pixel Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --accent: #2563eb;
      --accent2: #38bdf8;
      --text: #e2e8f0;
      --dim: #475569;
      --card: #111827;
      --border: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100dvh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── HEADER ── */
    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,15,.95);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .06em;
      background: linear-gradient(120deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }
    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #score-badge {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 10px;
      color: var(--accent2);
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--accent2);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .controls::-webkit-scrollbar { display: none; }
    .ctrl-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .1s;
      letter-spacing: .03em;
      white-space: nowrap;
    }
    .ctrl-btn:active { transform: scale(.95); }
    .ctrl-btn.active {
      background: var(--accent);
      border-color: var(--accent2);
      color: #fff;
    }
    .ctrl-btn.danger { border-color: #ef4444; color: #ef4444; }
    .ctrl-btn.danger:active { background: #ef4444; color: #fff; }
    .ctrl-btn.success { border-color: #22c55e; color: #22c55e; }
    .ctrl-btn.success:active { background: #22c55e; color: #fff; }

    /* ── INFO BAR ── */
    .info-bar {
      padding: 6px 12px;
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      color: var(--dim);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .info-bar span { color: var(--accent2); }

    /* ── MAIN GRID ── */
    main {
      flex: 1;
      min-height: 0;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    /* ── PIXEL GRID ── */
    #pixel-grid {
      display: grid;
      gap: 3px;
      touch-action: none;
      user-select: none;
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    .cell {
      width: 100%;
      height: 100%;
      border-radius: 5px;
      background: #111;
      cursor: pointer;
      transition: background .12s, transform .08s, box-shadow .12s;
      border: 1px solid #1a1a2e;
      position: relative;
      overflow: hidden;
    }
    .cell::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: linear-gradient(135deg, rgba(255,255,255,.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .cell.on {
      background: var(--accent);
      border-color: var(--accent2);
      box-shadow: 0 0 8px rgba(37,99,235,.5);
      transform: scale(.93);
    }
    .cell.on.color-red    { background: #ef4444; border-color: #fca5a5; box-shadow: 0 0 8px rgba(239,68,68,.5); }
    .cell.on.color-green  { background: #22c55e; border-color: #86efac; box-shadow: 0 0 8px rgba(34,197,94,.5); }
    .cell.on.color-yellow { background: #eab308; border-color: #fde047; box-shadow: 0 0 8px rgba(234,179,8,.5); }
    .cell.on.color-white  { background: #f8fafc; border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,.4); }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      background: var(--card);
      border-radius: 99px;
      height: 5px;
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .3s;
    }

    /* ── RESULT TOAST ── */
    #result {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      z-index: 150;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    #result.show { display: block; animation: fadeUp .4s ease; }
    #result h2 { font-size: 1.1rem; margin-bottom: 4px; }
    #result p  { font-size: .75rem; color: var(--dim); font-family: 'Space Mono', monospace; }
    #result.good h2 { color: #22c55e; }
    #result.bad  h2 { color: #ef4444; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translate(-50%, 12px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ── FULLSCREEN MODE ── */
    body.fullscreen header,
    body.fullscreen .controls,
    body.fullscreen .info-bar,
    body.fullscreen .progress-wrap {
      display: none;
    }
    body.fullscreen main { padding: 0; gap: 0; }
    body.fullscreen #pixel-grid { gap: 1px; }
    body.fullscreen .cell { border-radius: 0; }
    #fullscreen-exit {
      display: none;
      position: fixed;
      top: env(safe-area-inset-top, 0);
      right: env(safe-area-inset-right, 0);
      margin: 8px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
      font-size: 1rem;
      cursor: pointer;
      z-index: 250;
      align-items: center;
      justify-content: center;
    }
    body.fullscreen #fullscreen-exit { display: flex; }

    /* ── SOLID COLOR TEST ── */
    #solid-test {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #solid-test.show { display: flex; }
    #solid-hint {
      background: rgba(0,0,0,.5);
      padding: 8px 20px;
      border-radius: 99px;
      font-size: .85rem;
      letter-spacing: .06em;
      color: #fff;
      pointer-events: none;
      font-family: 'Space Mono', monospace;
    }

    /* ── TABLET / DESKTOP BLOCK ── */
    #tablet-block {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      gap: 16px;
    }
    #tablet-block.show { display: flex; }
    #tablet-block .icon { font-size: 4rem; }
    #tablet-block h2 {
      font-size: 1.4rem;
      background: linear-gradient(120deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    #tablet-block p {
      font-family: 'Space Mono', monospace;
      font-size: .85rem;
      color: var(--dim);
      max-width: 340px;
      line-height: 1.6;
    }
    #tablet-block .device-info {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--accent2);
      padding: 6px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
    }

    /* ── RESPONSIVE TWEAKS ── */
    /* Very small phones (≤360px) */
    @media (max-width: 360px) {
      header h1 { font-size: 1rem; }
      #score-badge { font-size: .65rem; padding: 3px 8px; }
      .ctrl-btn { padding: 5px 10px; font-size: .78rem; }
      .info-bar { font-size: .58rem; gap: 8px; padding: 5px 10px; }
      header { padding: 8px 10px; }
    }
    /* Landscape phones — compact header/controls */
    @media (orientation: landscape) and (max-height: 480px) {
      header { padding: 6px 12px; }
      header h1 { font-size: 1rem; }
      .controls { padding: 5px 10px; }
      .ctrl-btn { padding: 5px 10px; font-size: .8rem; }
      .info-bar { display: none; }
      main { padding: 4px; gap: 4px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📱 Ekran Tester</h1>
  <div class="header-right">
    <div id="score-badge">0 / 0</div>
    <button class="icon-btn" onclick="toggleFullscreen()" title="To'liq ekran">⛶</button>
  </div>
</header>

<div class="controls">
  <button class="ctrl-btn active" id="btn-blue"   onclick="setColor('blue')">🔵 Ko'k</button>
  <button class="ctrl-btn"        id="btn-red"    onclick="setColor('red')">🔴 Qizil</button>
  <button class="ctrl-btn"        id="btn-green"  onclick="setColor('green')">🟢 Yashil</button>
  <button class="ctrl-btn"        id="btn-yellow" onclick="setColor('yellow')">🟡 Sariq</button>
  <button class="ctrl-btn"        id="btn-white"  onclick="setColor('white')">⚪ Oq</button>
  <button class="ctrl-btn success"                onclick="toggleAllOn()">✅ Hammasini yoq</button>
  <button class="ctrl-btn danger"                 onclick="resetAll()">♻️ Tozala</button>
  <button class="ctrl-btn"                        onclick="openSolid()">🖥️ Solid</button>
</div>

<div class="info-bar">
  <div>Ekran: <span id="info-screen">—</span></div>
  <div>Grid: <span id="info-grid">—</span></div>
  <div>Yoniq: <span id="info-on">0</span></div>
  <div>O'chiq: <span id="info-off">0</span></div>
</div>

<main>
  <div id="pixel-grid"></div>
  <div class="progress-wrap"><div id="progress-bar"></div></div>
</main>

<div id="result">
  <h2 id="result-title"></h2>
  <p  id="result-desc"></p>
</div>

<button id="fullscreen-exit" onclick="toggleFullscreen()">✕</button>

<!-- SOLID COLOR FULLSCREEN -->
<div id="solid-test">
  <div id="solid-hint">Bosing → rang almashtiradi | Ushlab turing → chiqish</div>
</div>

<!-- TABLET / DESKTOP BLOCK -->
<div id="tablet-block">
  <div class="icon">📱</div>
  <h2>Faqat telefon uchun</h2>
  <p>Bu ilova faqat mobil telefonlar uchun mo'ljallangan. Iltimos, telefoningizdan kiring yoki brauzer derazasini kichraytiring.</p>
  <div class="device-info" id="device-info">—</div>
</div>

<script>
  const COLORS = ['blue','red','green','yellow','white'];
  const SOLID_COLORS = [
    '#000000','#ffffff','#ef4444','#22c55e','#2563eb',
    '#eab308','#a855f7','#ec4899','#f97316','#0ea5e9'
  ];

  let currentColor = 'blue';
  let cells = [];
  let cols = 0, rows = 0;
  let solidIdx = 0;
  let solidTimer = null;
  let isPointerDown = false;

  /* ─── BUILD GRID ─── */
  function buildGrid() {
    const grid = document.getElementById('pixel-grid');
    // Use the actual rendered container size so cells stretch perfectly to fill it
    const W = grid.clientWidth;
    const H = grid.clientHeight;
    if (W <= 0 || H <= 0) {
      requestAnimationFrame(buildGrid);
      return;
    }

    const isFs = document.body.classList.contains('fullscreen');
    const targetCell = isFs ? 36 : 44;
    const gap = isFs ? 1 : 3;

    cols = Math.max(6, Math.min(20, Math.round((W + gap) / (targetCell + gap))));
    rows = Math.max(8, Math.min(40, Math.round((H + gap) / (targetCell + gap))));

    // Use 1fr for both axes so cells fill the entire grid container
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
    grid.innerHTML = '';
    cells = [];

    const total = cols * rows;
    for (let i = 0; i < total; i++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.dataset.idx = i;
      grid.appendChild(el);
      cells.push({ el, on: false });
    }

    document.getElementById('info-screen').textContent =
      `${window.innerWidth}×${window.innerHeight}`;
    document.getElementById('info-grid').textContent = `${cols}×${rows}`;
    updateScore();
    attachEvents();
  }

  /* ─── TOGGLE CELL ─── */
  function toggleCell(idx) {
    const c = cells[idx];
    c.on = !c.on;
    c.el.className = 'cell' + (c.on ? ` on color-${currentColor}` : '');
    updateScore();
  }

  function forceOn(idx) {
    const c = cells[idx];
    if (!c.on) {
      c.on = true;
      c.el.className = `cell on color-${currentColor}`;
      updateScore();
    }
  }

  /* ─── SCORE ─── */
  function updateScore() {
    const on  = cells.filter(c => c.on).length;
    const off = cells.length - on;
    document.getElementById('score-badge').textContent = `${on} / ${cells.length}`;
    document.getElementById('info-on').textContent  = on;
    document.getElementById('info-off').textContent = off;
    document.getElementById('progress-bar').style.width = (on / cells.length * 100) + '%';

    const res = document.getElementById('result');
    if (on === cells.length && cells.length > 0) {
      res.className = 'show good';
      document.getElementById('result-title').textContent = '✅ Ekran mukammal!';
      document.getElementById('result-desc').textContent =
        `Barcha ${cells.length} ta piksel ishlaydi.`;
    } else {
      res.className = '';
    }
  }

  /* ─── POINTER EVENTS (touch + mouse) ─── */
  function cellFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (el && el.classList.contains('cell')) return +el.dataset.idx;
    return null;
  }

  function attachEvents() {
    const grid = document.getElementById('pixel-grid');

    grid.onpointerdown = e => {
      isPointerDown = true;
      try { grid.setPointerCapture(e.pointerId); } catch (_) {}
      const idx = cellFromPoint(e.clientX, e.clientY);
      if (idx !== null) toggleCell(idx);
    };

    grid.onpointermove = e => {
      if (!isPointerDown) return;
      const idx = cellFromPoint(e.clientX, e.clientY);
      if (idx !== null) forceOn(idx);
    };

    grid.onpointerup     = () => { isPointerDown = false; };
    grid.onpointercancel = () => { isPointerDown = false; };
  }

  /* ─── COLOR BUTTONS ─── */
  function setColor(c) {
    currentColor = c;
    COLORS.forEach(x => {
      document.getElementById('btn-' + x)?.classList.toggle('active', x === c);
    });
  }

  /* ─── RESET ─── */
  function resetAll() {
    cells.forEach(c => { c.on = false; c.el.className = 'cell'; });
    document.getElementById('result').className = '';
    updateScore();
  }

  function toggleAllOn() {
    const allOn = cells.every(c => c.on);
    cells.forEach(c => {
      c.on = !allOn;
      c.el.className = 'cell' + (c.on ? ` on color-${currentColor}` : '');
    });
    updateScore();
  }

  /* ─── FULLSCREEN MODE ─── */
  function toggleFullscreen() {
    document.body.classList.toggle('fullscreen');
    // Try real browser fullscreen as well
    if (document.body.classList.contains('fullscreen')) {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    } else {
      if (document.exitFullscreen && document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }
    requestAnimationFrame(buildGrid);
  }

  /* ─── SOLID FULLSCREEN ─── */
  function openSolid() {
    solidIdx = 0;
    const el = document.getElementById('solid-test');
    el.classList.add('show');
    el.style.background = SOLID_COLORS[solidIdx];
  }

  document.getElementById('solid-test').addEventListener('click', () => {
    solidIdx = (solidIdx + 1) % SOLID_COLORS.length;
    document.getElementById('solid-test').style.background = SOLID_COLORS[solidIdx];
  });

  document.getElementById('solid-test').addEventListener('contextmenu', e => {
    e.preventDefault();
    document.getElementById('solid-test').classList.remove('show');
  });

  document.getElementById('solid-test').addEventListener('pointerdown', () => {
    solidTimer = setTimeout(() => {
      document.getElementById('solid-test').classList.remove('show');
    }, 800);
  });
  document.getElementById('solid-test').addEventListener('pointerup', () => {
    clearTimeout(solidTimer);
  });

  /* ─── DEVICE DETECTION (phone only) ─── */
  function isPhone() {
    const ua = navigator.userAgent || '';
    const w  = window.innerWidth;
    const h  = window.innerHeight;
    const minSide = Math.min(w, h);
    const maxSide = Math.max(w, h);

    // Tablet markers in UA
    const isTabletUA = /iPad|Tablet|PlayBook|Silk|Kindle/i.test(ua) ||
                       (/Android/i.test(ua) && !/Mobile/i.test(ua));
    if (isTabletUA) return false;

    // Desktop (no touch + large screen)
    const hasTouch = ('ontouchstart' in window) ||
                     (navigator.maxTouchPoints > 0);
    if (!hasTouch && minSide > 500) return false;

    // Phone size threshold:
    // Phones: shorter side ≤ 480px  AND  longer side ≤ 950px
    if (minSide > 480) return false;
    if (maxSide > 950) return false;

    return true;
  }

  function checkDevice() {
    const block = document.getElementById('tablet-block');
    const info  = document.getElementById('device-info');
    info.textContent = `${window.innerWidth}×${window.innerHeight}`;
    if (isPhone()) {
      block.classList.remove('show');
      buildGrid();
    } else {
      block.classList.add('show');
    }
  }

  /* ─── INIT ─── */
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(checkDevice, 120);
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(checkDevice, 200);
  });
  window.addEventListener('load', checkDevice);
  // first paint
  requestAnimationFrame(checkDevice);
</script>
</body>
</html>
